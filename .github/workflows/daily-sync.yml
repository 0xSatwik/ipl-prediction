name: Daily Data Sync & Deploy

on:
  schedule:
    # 20:30 UTC = 02:00 IST (next day)
    - cron: '30 20 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python: rebuild app-data.json ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build app data
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python scripts/build_data.py

      # ── Commit updated data back to repo ──
      - name: Check for data changes
        id: changes
        run: |
          git diff --quiet data/generated/app-data.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated/app-data.json
          git commit -m "chore: auto-sync match data $(date -u +%Y-%m-%d)"
          git push

      # ── Node: build SvelteKit for Cloudflare Pages ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build SvelteKit
        run: npm run build

      # ── Deploy to Cloudflare Pages ──
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project create ipl-prediction --production-branch=main 2>/dev/null || true
          npx wrangler pages deploy .svelte-kit/cloudflare --project-name=ipl-prediction
